<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"
    />
    <title>BananaQ — Language Selection</title>
    <link rel="stylesheet" href="assets/css/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-fullscreen" id="appFullscreen">
      <div class="app-content" id="languageScreen">
        <div class="language-container">
          <div class="logo-wrapper">
            <img
              src="assets/img/logo.png"
              alt="BananaQ Logo"
              onerror="this.src = 'https://placehold.co/100x95?text=🍌'"
            />
          </div>
          <div class="app-title">BananaQ</div>
          <div class="tagline" id="tagline">
            Have an agriculture-filled day!
          </div>
          <div class="choose-text" id="chooseText">
            Choose your preferred language
          </div>

          <button class="lang-btn" id="btnEnglish">
            <div class="btn-frame">
              <div class="flag-circle">
                <img
                  src="https://flagcdn.com/w80/us.png"
                  alt="USA"
                  onerror="this.src = 'https://placehold.co/40x40?text=🇺🇸'"
                />
              </div>
              <span class="lang-label">English</span>
            </div>
          </button>

          <button class="lang-btn" id="btnTagalog">
            <div class="btn-frame">
              <div class="flag-circle">
                <img
                  src="https://flagcdn.com/w80/ph.png"
                  alt="Philippines"
                  onerror="this.src = 'https://placehold.co/40x40?text=🇵🇭'"
                />
              </div>
              <span class="lang-label">Tagalog</span>
            </div>
          </button>

          <div class="terms-wrapper">
            <label class="checkbox-inline" id="termsLabel">
              <input type="checkbox" id="termsAgree" />
              <span id="termsText"
                >I have read and agreed to the
                <a href="#" id="termsLink">Terms of Use</a> and
                <a href="#" id="privacyLink">Privacy Policy</a></span
              >
            </label>
          </div>

          <button class="submit-btn" id="submitBtn">Submit</button>
          <div id="errorMsg" class="error-msg"></div>
        </div>
      </div>

      <div class="app-content" id="getStartedScreen" style="display: none">
        <div class="getstarted-container">
          <div class="logo-wrapper-small">
            <img
              src="assets/img/logo.png"
              alt="BananaQ Logo"
              onerror="this.src = 'https://placehold.co/80x76?text=🍌'"
            />
          </div>
          <div class="app-title-small">BananaQ</div>
          <div class="message-text" id="messageText">
            It is our hope to assist you with concerns about your banana leaves,
            so you can keep your crops healthy and your harvest plentiful.
          </div>
          <button class="getstarted-btn" id="getStartedBtn">Get Started</button>
          <div class="image-wrapper">
            <img
              src="assets/img/getstarted.png"
              alt="Get Started"
              onerror="this.src = 'https://placehold.co/412x404?text=🌿'"
            />
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/index.js"></script>
  </body>
</html>
